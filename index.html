<!-- Universal AI bus + context + prompts -->
<script id="wb-lib">
/* wb-context.js */
/* WanderBrief canonical context — single source of truth for all AI prompts.
 *
 * WB_buildContext(client, numbers) → context object every prompt_template consumes.
 *
 * If you need a new field in prompts, add it here ONCE, not in each builder.
 * Prompt builders (in lib/wb-prompts.js) read from this, never from client directly.
 */

(function() {
  function ownership(client) {
    return [
      client.lgbtq_owned && 'LGBTQ+-owned',
      client.women_owned && 'women-owned',
      client.minority_owned && 'minority-owned',
      client.veteran_owned && 'veteran-owned',
      client.disability_hiring && 'disability-inclusive employer',
    ].filter(Boolean);
  }

  window.WB_buildContext = function(client, numbers = {}) {
    return {
      // business identity
      slug: client.slug || (client.business_name || '').toLowerCase().replace(/\s+/g, '-'),
      business_name: client.business_name,
      client_name: client.client_name,
      business_type: client.business_type,     // "food" | "trades" | "services"
      industry: client.industry,
      handle: client.handle,

      // location
      city: client.city,
      state: client.state,
      city_state: `${client.city}, ${client.state}`,
      texas_business: client.state === 'TX',

      // operations
      hours: client.hours,
      services: client.services || [],
      customer_types: client.customer_types || [],
      employee_count: client.employee_count,
      years_in_business: client.years_in_business,
      website: client.website,
      phone: client.phone,
      email: client.email,

      // economics
      monthly_revenue_est: client.monthly_revenue_est || 0,
      avg_job_value: client.avg_job_value || 0,

      // TikTok
      tiktok_followers: client.tiktok_followers || 0,
      tiktok_avg_views: client.tiktok_avg_views || 0,

      // reviews
      google_rating: client.google_rating,
      google_review_count: client.google_review_count,

      // ownership flags (raw + composed)
      lgbtq_owned: !!client.lgbtq_owned,
      women_owned: !!client.women_owned,
      minority_owned: !!client.minority_owned,
      veteran_owned: !!client.veteran_owned,
      disability_hiring: !!client.disability_hiring,
      ownership: ownership(client),
      ownership_phrase: ownership(client).join(', ') || 'Not disclosed',

      // strategic POV (from brief)
      one_line_verdict: client.one_line_verdict,
      opportunity_summary: client.opportunity_summary,
      phase0_actions: client.phase0_actions || [],

      // user-entered live numbers
      numbers,
      has_numbers: Object.keys(numbers).length > 0,

      // ai preferences (future; honored by WB_ai on per-call basis)
      ai_prefs: client.ai || { live_chatbot: true, live_polish: true, provider_override: null },
    };
  };

  // Helper: format numbers block for inclusion in a prompt
  window.WB_formatNumbers = function(numbers) {
    if (!numbers || !Object.keys(numbers).length) return '';
    const lines = Object.entries(numbers)
      .filter(([, v]) => v !== undefined && v !== null && v !== '')
      .map(([k, v]) => `- ${k.replace(/_/g, ' ')}: ${typeof v === 'number' ? '$' + v.toLocaleString() : v}`);
    return lines.length ? '\nLive numbers (user-entered):\n' + lines.join('\n') : '';
  };
})();


/* wb-prompts.js */
/* WanderBrief prompt templates — every AI-addressable surface has one.
 *
 * Each template takes a WB_buildContext() object and returns { system, user }.
 * Templates are referenced by id in a content_block's ai_actions[].prompt_template.
 *
 * Adding a new action:
 *   1. Add a template here with a unique id (e.g. "revenue.channels").
 *   2. Declare the action in client-config content_blocks[].ai_actions[].
 *   3. Renderer handles the rest.
 */

(function() {
  const SYS_BASE = (ctx) => `You are a growth-strategy AI for ${ctx.business_name}, a ${ctx.business_type} business in ${ctx.city_state}. Owner: ${ctx.client_name}.

Business snapshot:
- Industry: ${ctx.industry}
- Hours: ${ctx.hours}
- Services: ${ctx.services.join(', ')}
- Customers: ${ctx.customer_types.join(', ')}
- Employees: ${ctx.employee_count}
- Years in business: ${ctx.years_in_business}
- Est. monthly revenue: $${ctx.monthly_revenue_est.toLocaleString()}
- Avg ${ctx.business_type === 'trades' ? 'job' : 'transaction'}: $${ctx.avg_job_value}
- Ownership: ${ctx.ownership_phrase}
- TikTok: ${ctx.tiktok_followers.toLocaleString()} followers, avg ${ctx.tiktok_avg_views.toLocaleString()} views

Strategic POV in this WanderBrief:
"${ctx.one_line_verdict}"

Opportunity:
${ctx.opportunity_summary}

Phase 0 actions:
${ctx.phase0_actions.map((a, i) => `${i + 1}. ${a}`).join('\n')}
${window.WB_formatNumbers(ctx.numbers)}

Rules:
- Answer from this business's situation, not generic.
- Reference WanderBrief sections (Phase 0, Timeline, Audit, Grants, Tools) when relevant.
- Direct, practical, encouraging. No fluff. Warm, generous, confident.
- If you don't know, say so and suggest how to find out.
- Response length: 3–5 sentences unless user asks for a long-form draft.
- For crisis topics (health, safety, legal, mental health): point to a human professional.`;

  const TEMPLATES = {
    // ============ Chatbot ============
    'chatbot.default': (ctx, { user }) => ({
      system: SYS_BASE(ctx),
      messages: [{ role: 'user', content: user }],
    }),

    // ============ Copy-prompt to ChatGPT (5) ============
    'copy.strategy': (ctx) => ({
      user: `I own ${ctx.business_name}, a ${ctx.business_type} business in ${ctx.city_state}${ctx.ownership.length ? ` (${ctx.ownership.join(', ')})` : ''}. We do ${ctx.services.slice(0, 3).join(', ')}. Est. monthly revenue $${ctx.monthly_revenue_est.toLocaleString()}, avg ${ctx.business_type === 'trades' ? 'job' : 'transaction'} $${ctx.avg_job_value}. Walk me through the highest-impact growth moves for the next 90 days — and what I should deliberately skip. Be specific. No generic advice.`,
    }),
    'copy.grants': (ctx) => ({
      user: `I run ${ctx.business_name}, a ${ctx.business_type} business in ${ctx.city_state}${ctx.ownership.length ? ` (${ctx.ownership.join(', ')})` : ''}. Give me a prioritized list of every grant I could realistically qualify for in 2026 — federal, ${ctx.state}, municipal, private. Include deadline, typical award, and the one sentence that best sells my business for each. Start with ones I could apply to this month.`,
    }),
    'copy.site': (ctx) => ({
      user: `I run ${ctx.business_name} (${ctx.industry}) in ${ctx.city_state}. ${ctx.website ? `Website: ${ctx.website}.` : 'I do not have a website yet.'} Audit my digital presence for conversion gaps. Rank critical / high / medium. For each: (a) exact fix, (b) expected revenue impact, (c) DIY time if I do it today. Assume solo owner, limited budget.`,
    }),
    'copy.revenue': (ctx) => ({
      user: `I run ${ctx.business_name} in ${ctx.city_state}. Revenue ~$${ctx.monthly_revenue_est.toLocaleString()}/mo, mostly from ${ctx.customer_types[0] || 'local customers'}. Give me 5 underused revenue channels I could activate in 30 days without adding staff. For each: projected monthly revenue range, setup cost, time to first dollar, biggest failure mode. Prioritize by ROI.`,
    }),
    'copy.tiktok': (ctx) => ({
      user: `I run ${ctx.handle} — ${ctx.business_name}, ${ctx.business_type} in ${ctx.city_state}. ${ctx.tiktok_followers.toLocaleString()} followers, avg ${ctx.tiktok_avg_views.toLocaleString()} views. Analyze my current TikTok strategy and give me a 4-week content calendar that converts views into revenue. Include hook formulas, cadence, and what to stop doing. Reference actual products: ${ctx.services.slice(0, 4).join(', ')}.`,
    }),

    // ============ SEO ============
    'seo.meta': (ctx, { product, location, keyword }) => ({
      system: SYS_BASE(ctx) + '\n\nYou are producing SEO title tags and meta descriptions. Hard limits: title ≤ 60 chars, description ≤ 160 chars. Return strict JSON: {"title":"...","description":"..."}. No preamble.',
      messages: [{ role: 'user', content: `Generate SEO title + meta for the "${product}" page, targeting "${keyword || product}" in ${location}.` }],
    }),

    // ============ Grant drafter ============
    'grant.nglcc': (ctx, { answers }) => ({
      system: SYS_BASE(ctx) + '\n\nYou are drafting a grant application. Output a structured, first-person narrative in the founder\'s voice. Warm and specific, not inflated. 500-800 words. Markdown section headings.',
      messages: [{ role: 'user', content: `Draft my NGLCC Community Impact Grant application. Facts to incorporate:\n${Object.entries(answers).map(([k, v]) => `- ${k.replace(/_/g, ' ')}: ${v}`).join('\n')}` }],
    }),
    'grant.amber': (ctx, { answers }) => ({
      system: SYS_BASE(ctx) + '\n\nDraft a $10K Amber Grant application (women-founded). 400-600 words, founder voice, specific and honest.',
      messages: [{ role: 'user', content: `Draft. Answers:\n${Object.entries(answers).map(([k, v]) => `- ${k.replace(/_/g, ' ')}: ${v}`).join('\n')}` }],
    }),
    'grant.mbda': (ctx, { answers }) => ({
      system: SYS_BASE(ctx) + '\n\nDraft an MBDA Capital Readiness Program application. 600-900 words, professional, growth-focused.',
      messages: [{ role: 'user', content: `Draft. Answers:\n${Object.entries(answers).map(([k, v]) => `- ${k.replace(/_/g, ' ')}: ${v}`).join('\n')}` }],
    }),
    'grant.txedc': (ctx, { answers }) => ({
      system: SYS_BASE(ctx) + '\n\nDraft a Texas Economic Development grant application. 400-600 words. Emphasize local Texas impact.',
      messages: [{ role: 'user', content: `Draft. Answers:\n${Object.entries(answers).map(([k, v]) => `- ${k.replace(/_/g, ' ')}: ${v}`).join('\n')}` }],
    }),
  };

  window.WB_prompts = {
    build(id, ctx, vars = {}) {
      const tpl = TEMPLATES[id];
      if (!tpl) throw new Error(`Unknown prompt template: ${id}`);
      return tpl(ctx, vars);
    },
    list() { return Object.keys(TEMPLATES); },
  };
})();


/* wb-ai.js */
/* WanderBrief AI Bus — single point of control for all AI-backed UI.
 *
 * Contract:
 *   WB_ai.ask({ system, user, messages, tier, signal })
 *     → { async *stream(): tokens, done: Promise<{text, provider, ms, fellBack}> }
 *
 * Tiers (cost ladder):
 *   - "client-side-only" : never calls AI. Rule-based / template. Here only for symmetry.
 *   - "local-ollama"     : reserved for dev loop (Claude Code). Not wired in prototype.
 *   - "gemini-stream"    : default client-facing. Hits WB_AI_ENDPOINT via Cloudflare Worker.
 *   - "opus-fallback"    : reserved — grant writing, legal. Falls back to window.claude.complete.
 *
 * Fallback order:
 *   gemini-stream → opus-fallback → copy-to-chatgpt (caller handles)
 *
 * Telemetry:
 *   Emits { action_id, provider, latency_ms, fell_back, client_slug } via WB_ai.onTelemetry
 *   (consumer wires this to the feedback Worker). No content logged.
 */

(function() {
  const WB_AI_ENDPOINT = window.WB_AI_ENDPOINT || 'https://tm-ai.michael-eisinger.workers.dev';
  const telemetryListeners = new Set();

  function emit(evt) {
    telemetryListeners.forEach(fn => { try { fn(evt); } catch {} });
  }

  async function callGeminiStream({ system, messages, signal }) {
    const res = await fetch(WB_AI_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system, messages }),
      signal,
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.body.getReader();
  }

  async function callOpusFallback({ system, messages }) {
    // window.claude.complete accepts a flat messages array or a single string.
    const lastUser = [...messages].reverse().find(m => m.role === 'user')?.content || '';
    const text = await window.claude.complete({
      messages: [{ role: 'user', content: system + '\n\nUser: ' + lastUser + '\n\nAnswer concisely.' }],
    });
    return text;
  }

  const WB_ai = {
    endpoint: WB_AI_ENDPOINT,

    // Streams output as an async iterator, plus a `done` promise with metadata.
    async ask({ system = '', messages = [], user, tier = 'gemini-stream', action_id = 'unknown', client_slug = 'unknown', signal } = {}) {
      if (user && !messages.length) messages = [{ role: 'user', content: user }];
      const started = performance.now();
      let provider = tier;
      let fellBack = false;
      let fullText = '';

      const self = this;
      async function* stream() {
        // gemini-stream first
        if (tier === 'gemini-stream') {
          try {
            const reader = await callGeminiStream({ system, messages, signal });
            const decoder = new TextDecoder();
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              const chunk = decoder.decode(value, { stream: true });
              fullText += chunk;
              yield chunk;
            }
            provider = 'gemini-stream';
            emit({ action_id, provider, latency_ms: Math.round(performance.now() - started), fell_back: false, client_slug });
            return;
          } catch (err) {
            fellBack = true;
            provider = 'opus-fallback';
          }
        }
        // opus-fallback (non-streaming → yield as single chunk)
        try {
          const text = await callOpusFallback({ system, messages });
          fullText = text;
          yield text;
          emit({ action_id, provider, latency_ms: Math.round(performance.now() - started), fell_back: fellBack, client_slug });
        } catch (err) {
          provider = 'none';
          emit({ action_id, provider, latency_ms: Math.round(performance.now() - started), fell_back: true, client_slug, error: String(err.message || err) });
          throw err;
        }
      }

      return {
        stream: stream(),
        get provider() { return provider; },
        get fellBack() { return fellBack; },
      };
    },

    // Copy-to-chatgpt degradation: always available, no AI required.
    async copyToChatGPT({ prompt, action_id = 'copy-prompt', client_slug = 'unknown' }) {
      await navigator.clipboard.writeText(prompt);
      emit({ action_id, provider: 'copy-to-chatgpt', latency_ms: 0, fell_back: false, client_slug });
      setTimeout(() => window.open('https://chat.openai.com/', '_blank'), 400);
    },

    onTelemetry(fn) { telemetryListeners.add(fn); return () => telemetryListeners.delete(fn); },
  };

  window.WB_ai = WB_ai;

  // Default telemetry: dev-mode console log. Production can wire this to the feedback Worker.
  WB_ai.onTelemetry(evt => {
    if (window.WB_TELEMETRY_DEBUG) console.log('[wb-ai]', evt);
  });
})();

</script>

<script type="text/babel" data-component="numbers-panel.jsx">
/* global React */
const { useState: useStateNP, useEffect: useEffectNP } = React;

// Global store for business numbers. Every calculator + AI prompt reads from here.
window.WB_NUMBERS = (function() {
  let state = {};
  const listeners = new Set();
  try { state = JSON.parse(localStorage.getItem('wb_numbers') || '{}'); } catch {}
  return {
    get: () => state,
    set: (patch) => {
      state = { ...state, ...patch };
      try { localStorage.setItem('wb_numbers', JSON.stringify(state)); } catch {}
      listeners.forEach(fn => fn(state));
    },
    subscribe: (fn) => { listeners.add(fn); return () => listeners.delete(fn); },
  };
})();

// Hook
window.useNumbers = function useNumbers() {
  const [n, setN] = useStateNP(window.WB_NUMBERS.get());
  useEffectNP(() => window.WB_NUMBERS.subscribe(setN), []);
  return [n, (patch) => window.WB_NUMBERS.set(patch)];
};

function NumbersPanel({ client }) {
  const [n, setN] = window.useNumbers();
  const [open, setOpen] = useStateNP(false);

  const fields = client.business_type === 'trades' ? tradesFields : foodFields;

  // Prefill sensible defaults from config if empty

        display:'flex', alignItems:'center', gap:16, padding:'10px 0',

      }}>
        <button onClick={()=>setOpen(o=>!o)} style={{
          background:'transparent', border:'1px solid rgba(243,236,220,0.3)',

    items.push({ sev:'critical', title:'No Google Business Profile', body:`You don't exist on Google Maps for local searches. These searches have commercial intent — people are ready to pay. You're invisible to them.`, fix:`Claim your profile at business.google.com. Add photos, services, hours, phone. Takes 20 minutes. Free.` });
  }
  if (client.handle === '@tiaaw_hydraulics') {
    items.push({ sev:'high', title:'No Click-to-Call on Mobile', body:`Your customers find you mid-emergency. They're holding a phone next to a broken machine. Every second between "I need help" and "I'm talking to Jordan" is a lost job.`, fix:`One-page site with a permanent click-to-call button pinned to the bottom of the screen on mobile.` });
    items.push({ sev:'high', title:'47 Reviews, No Schema Markup', body:`Your 4.9-star rating doesn't show up as stars in Google search results because you have no structured data. Reviews are hidden gold.`, fix:`Add LocalBusiness + AggregateRating JSON-LD. Free. Makes your listing stand out in search.` });
    items.push({ sev:'medium', title:'No Email Capture for Fleet Operators', body:`Fleet operators evaluate vendors quarterly. You have no way to stay in front of them between jobs.`, fix:`Simple form: "Join our fleet operator list — quarterly maintenance tips." Monthly email, zero selling.` });
  }
  return items;
}

    all: items.length,
    critical: items.filter(i => i.sev === 'critical').length,
    high: items.filter(i => i.sev === 'high').length,
    medium: items.filter(i => i.sev === 'medium').length,

          </p>

          {/* Filter bar */}
          <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
            {[['all','All findings'],['critical','Critical'],['high','High'],['medium','Medium']].map(([k, label]) => (
              <button key={k} onClick={()=>setFilter(k)} style={{
                background: filter === k ? 'var(--ink)' : 'transparent',
                color: filter === k ? 'var(--paper)' : 'var(--ink)',
                border:'1px solid var(--ink)', padding:'7px 14px',
                fontFamily:'var(--ff-mono)', fontSize:11, letterSpacing:'0.1em',
                textTransform:'uppercase', cursor:'pointer',
              }}>{label} <span style={{ opacity:0.5, marginLeft:6 }}>{counts[k]}</span></button>
            ))}
          </div>
        </div>

        <div style={{ borderTop:'1px solid var(--rule)' }}>

                      {item.fix}

    tiktok: `I run @${(client.handle||'').replace('@','')} — ${name}, a ${client.business_type} business in ${loc}. I have ${(client.tiktok_followers||0).toLocaleString()} followers and avg ${(client.tiktok_avg_views||0).toLocaleString()} views. Analyze my current TikTok strategy and give me a 4-week content calendar that converts views into revenue. Include hook formulas, posting cadence, and what to stop doing. Reference actual products: ${(client.services||[]).slice(0,4).join(', ')}.`,

// ===== Cost Analyzer (rule-based) =====
function CostAnalyzer({ client }) {
  const [n] = window.useNumbers();
  const recs = useMemoAT(() => {
    const r = [];
    const totalRev = (n.in_store_rev||0) + (n.online_rev||0) + (n.monthly_rev||0);
    const rent = (n.rent_1||0) + (n.rent_2||0);
    const payroll = n.payroll||0;
    const supplies = n.supplies||0;
    const cash = n.cash||0;
    const burn = rent + payroll + supplies + (n.fuel||0);

    if (cash && burn) {
      const months = (cash/burn).toFixed(1);
      r.push({
        severity: cash < burn ? 'critical' : cash < burn*3 ? 'high' : 'ok',
        title: `${months} months of runway at current burn`,
        body: cash < burn
          ? `You have less than one month of cushion. Every decision below is framed by that reality — preserve cash first, grow second.`
          : cash < burn*3
          ? `You have under 3 months of cushion. Don't starve the business, but any non-essential spend is worth interrogating.`
          : `You have healthy runway. You can afford to make one long-bet investment this quarter.`,
        saving: null,
      });
    }
    if (rent && totalRev && rent/totalRev > 0.20) {
      r.push({
        severity:'high', title:'Rent is eating too much of top-line',
        body:`Rent at $${rent.toLocaleString()}/mo is ${Math.round(rent/totalRev*100)}% of revenue. Healthy ${client.business_type==='trades'?'trades':'retail'} businesses keep this under 15–18%. Renegotiate or consolidate.`,
        saving: Math.round(rent*0.12),
      });
    }
    if (n.rent_2 && n.rent_1) {
      r.push({
        severity:'high', title:'Two rents may be one too many',
        body:`A second location at $${n.rent_2.toLocaleString()}/mo is $${(n.rent_2*12).toLocaleString()} of annual overhead. If the second location isn't clearing its rent in gross margin, close it and ship the difference.`,
        saving: n.rent_2,
      });
    }
    if (payroll && totalRev && payroll/totalRev > 0.35) {
      r.push({
        severity:'medium', title:'Payroll ratio is elevated',
        body:`Payroll at ${Math.round(payroll/totalRev*100)}% of revenue is above a healthy ${client.business_type==='trades'?'trades':'food'} benchmark. Look at hours, not headcount — cut a shift before you cut a person.`,
        saving: Math.round(payroll*0.08),
      });
    }
    if (n.online_rev !== undefined && n.in_store_rev && (n.online_rev/(n.in_store_rev+n.online_rev)) < 0.15) {
      r.push({
        severity:'high', title:'Online is under-indexed vs your audience',
        body:`Online is only ${Math.round((n.online_rev/(n.in_store_rev+n.online_rev||1))*100)}% of revenue despite ${(client.tiktok_followers||0).toLocaleString()} followers. TikTok Shop + Goldbelly can triple online share in 90 days.`,
        saving: null,
      });
    }
    if (r.length === 0) {
      r.push({ severity:'ok', title:'Fill in your numbers above',
        body:'Once you add rent, payroll, revenue, and cash, I\'ll analyze your cost structure and surface the 3 biggest leaks.', saving:null });
    }
    return r;
  }, [JSON.stringify(n)]);

  return (
    <div style={{ border:'1px solid var(--rule)', padding:'var(--s-6)', background:'var(--paper-card)' }}>
      <div className="fine" style={{ marginBottom:6, color:'var(--accent)' }}>Cost Analyzer</div>
      <h3 className="display" style={{ fontSize:28, marginBottom:16, lineHeight:1.1 }}>
        Where your money is<br/><em>actually leaking.</em>
      </h3>
      <p style={{ fontSize:14, color:'var(--ink-soft)', marginBottom:18, lineHeight:1.55 }}>
        Uses the numbers panel at the top of the page. Updates live as you fill it in.
      </p>
      <div style={{ display:'grid', gap:10 }}>
        {recs.map((r,i) => (
          <div key={i} style={{
            padding:'14px 16px', borderLeft:`3px solid ${r.severity==='critical'?'var(--accent)':r.severity==='high'?'var(--ink)':r.severity==='medium'?'var(--ink-mid)':'var(--ink-fade)'}`,
            background:'var(--paper)',
          }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:4 }}>
              <strong style={{ fontFamily:'var(--ff-display)', fontSize:19, fontWeight:400 }}>{r.title}</strong>
              {r.saving && <span className="fine" style={{ color:'var(--accent)' }}>~${r.saving.toLocaleString()}/mo saved</span>}
            </div>
            <p style={{ fontSize:14, color:'var(--ink-soft)', lineHeight:1.55 }}>{r.body}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

<script type="text/babel" data-component="chatbot.jsx">
/* global React */
const { useState: useStateCB, useRef: useRefCB, useEffect: useEffectCB } = React;

// Reads completion state from localStorage.
// Phase 0: wb_p0_<handle> = { "0": true, "2": true } (keys are indexes into phase0_actions)
// Timeline: wb_tl_<handle> = { "w1_0": true, ... } (keys are item ids)
window.WB_readProgress = function(client) {
  const out = { phase0_done: [], phase0_todo: [], phase0_done_labels: [], phase0_todo_labels: [], recent_updates: client.recent_updates || [] };
  try {
    const p0 = JSON.parse(localStorage.getItem('wb_p0_'+client.handle) || '{}');
    (client.phase0_actions || []).forEach((a, i) => {
      if (p0[i]) { out.phase0_done.push(i); out.phase0_done_labels.push(a); }
      else       { out.phase0_todo.push(i); out.phase0_todo_labels.push(a); }
    });
  } catch {}
  try {
    const tl = JSON.parse(localStorage.getItem('wb_tl_'+client.handle) || '{}');
    out.timeline_done_count = Object.values(tl).filter(Boolean).length;
  } catch { out.timeline_done_count = 0; }
  return out;
};

// Builds the per-client system prompt in the same shape as the production template.
window.WB_buildSystemPrompt = function(client, numbers) {
  const certs = [
    client.lgbtq_owned && 'LGBTQ+-owned',
    client.women_owned && 'Women-owned',
    client.minority_owned && 'Minority-owned',
    client.veteran_owned && 'Veteran-owned',
    client.disability_hiring && 'Disability-inclusive employer',
  ].filter(Boolean).join(' · ') || 'Not disclosed';

  const numsStr = numbers && Object.keys(numbers).length
    ? '\nCurrent numbers (user-entered):\n' + Object.entries(numbers).map(([k,v])=>`- ${k}: ${v}`).join('\n')
    : '';

  const progress = window.WB_readProgress(client);
  const progressStr = progress.phase0_done.length
    ? `\nProgress so far — DO NOT recommend things already done:\nDone (${progress.phase0_done.length}/${(client.phase0_actions||[]).length}): ${progress.phase0_done_labels.join(' · ')}\nStill outstanding: ${progress.phase0_todo_labels.join(' · ') || '(all done)'}\nTimeline tasks checked off: ${progress.timeline_done_count}`
    : `\nProgress: nothing checked off yet — recommend starting with the outstanding Phase 0 list below.`;
  const recentStr = (progress.recent_updates || []).length
    ? `\nRecent updates the client told us about (apply these as current truth, do not re-suggest):\n${progress.recent_updates.map(u=>`- [${u.type}] ${u.note} (${u.date})`).join('\n')}`
    : '';

  return `You are a growth-strategy AI assistant for ${client.business_name}, a ${client.business_type} business in ${client.city}, ${client.state}. The owner is ${client.client_name}.

Business overview:
- Type: ${client.business_type} | Industry: ${client.industry}
- Hours: ${client.hours}
- Services: ${(client.services||[]).join(', ')}
- Customers: ${(client.customer_types||[]).join(', ')}
- Employees: ${client.employee_count}
- Years in business: ${client.years_in_business}
- Est. monthly revenue: $${(client.monthly_revenue_est||0).toLocaleString()}
- Avg job/transaction: $${client.avg_job_value||'-'}
- Certifications: ${certs}

TikTok presence (April 2026):
- Followers: ${(client.tiktok_followers||0).toLocaleString()}
- Avg views: ${(client.tiktok_avg_views||0).toLocaleString()}

Opportunity:
${client.opportunity_summary}

Verdict (the one-line strategic POV in this dossier):
"${client.one_line_verdict}"

Phase 0 actions (what ${client.client_name} should do this week):
${(client.phase0_actions||[]).map((a,i)=>`${i+1}. ${a}`).join('\n')}
${progressStr}
${recentStr}
${numsStr}

Your role:
- Answer questions about this specific business — not generic advice.
- Reference sections in this WanderBrief page when relevant (Phase 0, Timeline, Audit, Grants, Revenue Channels).
- Be direct, practical, encouraging — no fluff. Tone: warm, generous, confident. Never marketing-speak.
- If you don't know something specific, say so and suggest how to find out.
- Keep responses to 3–5 sentences unless a longer answer is clearly needed.
- When asked about Michael (who built this): He built this page as a free proof-of-concept. Reach him at 202-834-3330 or michael.eisinger@wanderingwithpride.com.
- If a question involves a crisis (health, safety, legal, mental health), gently point to a human professional.`;
};

function Chatbot({ client }) {
  const [numbers] = window.useNumbers ? window.useNumbers() : [{}, ()=>{}];
  const suggestions = [
    `What should ${client.client_name} do first this week?`,
    `Which grant could we realistically land?`,
    `What would you do first with $1,000?`,
    `Explain the biggest opportunity in plain terms.`,
  ];

  const [messages, setMessages] = useStateCB([
    { role:'assistant', content:`Hi ${client.client_name} — I've read this whole dossier. Ask me anything about ${client.business_name}. I'll answer from what's in here, or tell you when I don't know.` }
  ]);
  const [input, setInput] = useStateCB('');
  const [busy, setBusy] = useStateCB(false);
  const [streaming, setStreaming] = useStateCB('');
  const [error, setError] = useStateCB(null);
  const scrollRef = useRefCB(null);
  const sessionRef = useRefCB(null);
  if (!sessionRef.current) sessionRef.current = 'wb-' + Math.random().toString(36).slice(2,10);

  useEffectCB(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, busy, streaming]);

  // Reset session on client switch
  useEffectCB(() => {
    setMessages([
      { role:'assistant', content:`Hi ${client.client_name} — I've read this whole dossier. Ask me anything about ${client.business_name}. I'll answer from what's in here, or tell you when I don't know.` }
    ]);
    sessionRef.current = 'wb-' + Math.random().toString(36).slice(2,10);
  }, [client.business_name]);

  const ask = async (q) => {
    if (!q.trim() || busy) return;
    const convo = [...messages, { role:'user', content:q }];
    setMessages(convo);
    setInput('');
    setBusy(true);
    setStreaming('');
    setError(null);

    const system = window.WB_buildSystemPrompt(client, numbers);
    // The Worker has its own hardcoded system prompt (generic Growth OS assistant) and
    // ignores the `system` field, so Gemini gets no dossier context. Workaround: embed
    // the dossier as preamble on the LATEST user message. Earlier turns keep their text.
    const msgs = convo.filter(m => m.role !== 'system');
    const lastIdx = msgs.map(m => m.role).lastIndexOf('user');
    if (lastIdx >= 0) {
      msgs[lastIdx] = {
        ...msgs[lastIdx],
        content: `[Dossier context — use this to answer, do not repeat it back]\n${system}\n[/Dossier context]\n\nMy question: ${msgs[lastIdx].content}`,
      };
    }
    const body = {
      system,
      messages: msgs,
      session_id: sessionRef.current,
    };

    try {
      const res = await fetch('https://tm-ai.michael-eisinger.workers.dev', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      // Read full body — Worker may stream SSE or return one JSON blob.
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let acc = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        acc += chunk;
        // Only paint streaming preview if response isn't wrapped JSON
        if (!acc.trim().startsWith('{')) setStreaming(acc);
      }
      // Extract plain text from common response shapes
      const extractText = (raw) => {
        const s = (raw || '').trim();
        if (!s.startsWith('{') && !s.startsWith('[')) return raw; // already plain text
        try {
          const d = JSON.parse(s);
          // Gemini: candidates[0].content.parts[0].text
          const g = d?.candidates?.[0]?.content?.parts?.[0]?.text;
          if (g) return g;
          // OpenAI-ish: choices[0].message.content
          const o = d?.choices?.[0]?.message?.content;
          if (o) return o;
          // Plain { text: "..." }
          if (typeof d?.text === 'string') return d.text;
          // Anthropic: content[0].text
          const a = Array.isArray(d?.content) ? d.content.map(p => p.text || '').join('') : null;
          if (a) return a;
          return raw;
        } catch { return raw; }
      };
      const text = extractText(acc) || '(no response)';
      setMessages(m => [...m, { role:'assistant', content: text }]);
      setStreaming('');
    } catch (e) {
      const msg = String(e.message || e);
      setError(msg);
      // Fall back to local Claude completion so the UX isn't dead
      try {
        const fallback = await window.claude.complete({
          messages: [{ role:'user', content: system + '\n\nUser: ' + q + '\n\nAnswer in 3-5 sentences.' }]
        });
        setMessages(m => [...m, { role:'assistant', content: fallback, fallback:true }]);
      } catch {
        setMessages(m => [...m, { role:'assistant', content: `Couldn't reach the AI just now. ${msg.includes('CORS') ? 'Looks like a CORS issue — the preview origin probably needs to be allowlisted on the Worker.' : 'Try again in a moment.'}`, error:true }]);
      }
    } finally {
      setBusy(false);
    }
  };

  return (
    <section data-screen-label="09 Ask WanderBrief" style={{
      padding:'var(--s-9) 0', background:'var(--ink)', color:'var(--paper)',
    }}>
      <div className="container">
        <div style={{
          display:'grid', gridTemplateColumns:'minmax(0,5fr) minmax(0,7fr)', gap:'var(--s-8)',
          alignItems:'start',
        }} className="cb-grid">

          <div>
            <div className="eyebrow" style={{ color:'rgba(243,236,220,0.6)', marginBottom:14 }}>
              Ask WanderBrief · Live
            </div>
            <h2 className="display" style={{ fontSize:'clamp(38px,5vw,68px)', color:'var(--paper)', marginBottom:18, lineHeight:1.02 }}>
              A reading<br/>companion,<br/><em>just for you.</em>
            </h2>
            <p style={{ fontSize:16, color:'rgba(243,236,220,0.72)', lineHeight:1.65, marginBottom:20, maxWidth:420 }}>
              Streams from Gemini 2.5 Flash via our own Cloudflare Worker. Context is only what's in this dossier plus the numbers you've entered above. Nothing is logged. No training. No ads, ever.
            </p>
            <p style={{ fontSize:12, color:'rgba(243,236,220,0.45)', lineHeight:1.5, marginBottom:24, maxWidth:380, fontFamily:'var(--ff-mono)', letterSpacing:'0.02em' }}>
              session · {sessionRef.current}<br/>
              endpoint · tm-ai.michael-eisinger.workers.dev
            </p>

            <div style={{ display:'grid', gap:8 }}>
              {suggestions.map(s => (
                <button key={s} onClick={()=>ask(s)} disabled={busy} style={{
                  textAlign:'left', background:'transparent', color:'var(--paper)',
                  border:'1px solid rgba(243,236,220,0.2)', padding:'10px 14px',
                  fontFamily:'var(--ff-body)', fontSize:13, cursor: busy?'not-allowed':'pointer',
                  transition:'all 0.2s var(--ease)', opacity: busy?0.5:1,
                }}
                onMouseEnter={(e)=>{if(!busy)e.currentTarget.style.background='rgba(243,236,220,0.05)'}}
                onMouseLeave={(e)=>e.currentTarget.style.background='transparent'}
                >→ {s}</button>
              ))}
            </div>
          </div>

          <div style={{
            background:'rgba(243,236,220,0.04)', border:'1px solid rgba(243,236,220,0.15)',
            padding:'var(--s-5)', minHeight:520, display:'flex', flexDirection:'column',
          }}>
            <div ref={scrollRef} style={{ flex:1, overflowY:'auto', maxHeight:560, marginBottom:16 }} className="no-scrollbar">
              {messages.map((m, i) => (
                <div key={i} style={{ marginBottom:18, maxWidth: m.role === 'user' ? '80%' : '100%', marginLeft: m.role === 'user' ? 'auto' : 0 }}>
                  <div style={{
                    fontFamily:'var(--ff-mono)', fontSize:10, letterSpacing:'0.14em',
                    textTransform:'uppercase', color:'rgba(243,236,220,0.5)', marginBottom:4,
                  }}>
                    {m.role === 'user' ? 'You' : 'WanderBrief'}{m.fallback ? ' · fallback' : ''}{m.error ? ' · error' : ''}
                  </div>
                  <div style={{
                    fontSize: m.role === 'assistant' ? 15 : 14, lineHeight:1.65, whiteSpace:'pre-wrap',
                    fontFamily: m.role === 'assistant' ? 'var(--ff-display)' : 'var(--ff-body)',
                    fontStyle: m.role === 'assistant' ? 'italic' : 'normal',
                    color: m.role === 'user' ? 'rgba(243,236,220,0.85)' : 'var(--paper)',
                    background: m.role === 'user' ? 'rgba(243,236,220,0.08)' : 'transparent',
                    padding: m.role === 'user' ? '10px 14px' : 0,
                  }}>
                    {m.content}
                  </div>
                </div>
              ))}
              {streaming && (
                <div style={{ marginBottom:18 }}>
                  <div style={{ fontFamily:'var(--ff-mono)', fontSize:10, letterSpacing:'0.14em', textTransform:'uppercase', color:'rgba(243,236,220,0.5)', marginBottom:4 }}>
                    WanderBrief · streaming
                  </div>
                  <div style={{ fontSize:15, lineHeight:1.65, whiteSpace:'pre-wrap', fontFamily:'var(--ff-display)', fontStyle:'italic' }}>
                    {streaming}<span className="wb-caret">▌</span>
                  </div>
                </div>
              )}
              {busy && !streaming && (
                <div style={{ fontFamily:'var(--ff-mono)', fontSize:11, color:'rgba(243,236,220,0.5)', letterSpacing:'0.1em' }}>
                  thinking…
                </div>
              )}
            </div>

            <form onSubmit={(e)=>{e.preventDefault(); ask(input);}} style={{
              display:'flex', gap:8, borderTop:'1px solid rgba(243,236,220,0.2)', paddingTop:14,
            }}>
              <input value={input} onChange={(e)=>setInput(e.target.value)}
                placeholder={`Ask about ${client.business_name}…`}
                style={{
                  flex:1, background:'transparent', border:0, outline:'none',
                  color:'var(--paper)', fontFamily:'var(--ff-body)', fontSize:14,
                  padding:'8px 2px',
                }}
              />
              <button type="submit" disabled={busy} style={{
                background:'var(--accent)', color:'var(--paper)', border:0,
                padding:'8px 16px', fontFamily:'var(--ff-mono)', fontSize:11,
                letterSpacing:'0.14em', textTransform:'uppercase', cursor: busy?'not-allowed':'pointer',
                opacity: busy?0.5:1,
              }}>{busy ? '…' : 'Ask →'}</button>
            </form>
          </div>
        </div>
      </div>
      <style>{`
        @media (max-width: 900px) { .cb-grid { grid-template-columns: 1fr !important; } }
        .wb-caret { animation: wbBlink 1s steps(2) infinite; opacity: 0.6; }
        @keyframes wbBlink { 50% { opacity: 0; } }
      `}</style>
    </section>
  );
}
window.Chatbot = Chatbot;

</script>

<script type="text/babel" data-component="floating-chat.jsx">
/* global React */
// Floating chat drawer — available on every screen via FAB.
// Reuses WB_buildSystemPrompt and talks to the same Worker endpoint.
const { useState: useStateFC, useRef: useRefFC, useEffect: useEffectFC } = React;

function FloatingChat({ client }) {
  const [open, setOpen] = useStateFC(false);
  const [input, setInput] = useStateFC('');
  const [busy, setBusy] = useStateFC(false);
  const [msgs, setMsgs] = useStateFC([
    { role:'assistant', content:`Hi — I've read your whole dossier. Ask about ${client.business_name} anytime.` }
  ]);
  const scrollRef = useRefFC(null);
  const sessionRef = useRefFC('wbf-' + Math.random().toString(36).slice(2,10));
  const [numbers] = window.useNumbers ? window.useNumbers() : [{}, ()=>{}];

  useEffectFC(() => {
    if (open && scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [msgs, busy, open]);

  const extractText = (raw) => {
    const s = (raw||'').trim();
    if (!s.startsWith('{') && !s.startsWith('[')) return raw;
    try {
      const d = JSON.parse(s);
      return d?.candidates?.[0]?.content?.parts?.[0]?.text
        || d?.choices?.[0]?.message?.content
        || (typeof d?.text === 'string' ? d.text : null)
        || (Array.isArray(d?.content) ? d.content.map(p=>p.text||'').join('') : null)
        || raw;
    } catch { return raw; }
  };

  const ask = async (q) => {
    if (!q.trim() || busy) return;
    const turn = { role:'user', content:q };
    const convo = [...msgs, turn];
    setMsgs(convo);
    setInput('');
    setBusy(true);

    const system = window.WB_buildSystemPrompt(client, numbers);
    const contextualized = `[Dossier context — use this to answer, do not repeat it back]\n${system}\n[/Dossier context]\n\nMy question: ${q}`;
    const apiMsgs = [...convo.slice(0,-1), { role:'user', content: contextualized }];

    try {
      const res = await fetch('https://tm-ai.michael-eisinger.workers.dev', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ system, messages: apiMsgs, session_id: sessionRef.current }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const raw = await res.text();
      const text = extractText(raw) || '(no response)';
      setMsgs(m => [...m, { role:'assistant', content: text }]);
    } catch (e) {
      try {
        const fallback = await window.claude.complete({
          messages: [{ role:'user', content: system + '\n\nUser: ' + q + '\n\nAnswer in 3-5 sentences.' }]
        });
        setMsgs(m => [...m, { role:'assistant', content: fallback, fallback:true }]);
      } catch {
        setMsgs(m => [...m, { role:'assistant', content: `Couldn't reach the AI just now — try again in a moment.`, error:true }]);
      }
    } finally {
      setBusy(false);
    }
  };

  return (
    <React.Fragment>
      {/* FAB — always visible */}
      <button aria-label="Ask WanderBrief" onClick={() => setOpen(o => !o)} style={{
        position:'fixed', right:22, bottom:22, zIndex:95,
        display:'inline-flex', alignItems:'center', gap:10,
        background: open ? 'var(--accent)' : 'var(--ink)',
        color:'var(--paper)', border:'1px solid ' + (open ? 'var(--accent)' : 'var(--ink)'),
        borderRadius:999, padding:'12px 18px',
        fontFamily:'var(--ff-mono)', fontSize:12,
        letterSpacing:'0.14em', textTransform:'uppercase',
        cursor:'pointer', boxShadow:'0 12px 32px rgba(17,17,14,0.28)',
        transition:'transform 0.2s var(--ease), background 0.2s var(--ease)',
      }}>
        <span style={{ fontSize:18, lineHeight:1 }}>{open ? '×' : '✦'}</span>
        <span>{open ? 'Close' : 'Ask WanderBrief'}</span>
      </button>

      {/* Drawer */}
      {open && (
        <div role="dialog" aria-label="Chat with WanderBrief" style={{
          position:'fixed', right:22, bottom:78, zIndex:94,
          width:'min(calc(100vw - 44px), 420px)',
          maxHeight:'calc(100vh - 120px)',
          background:'var(--ink)', color:'var(--paper)',
          border:'1px solid var(--rule)', borderRadius:12,
          boxShadow:'0 24px 60px rgba(17,17,14,0.45)',
          display:'flex', flexDirection:'column',
          fontFamily:'var(--ff-body)',
          overflow:'hidden',
        }}>
          {/* Header */}
          <div style={{
            padding:'14px 18px', borderBottom:'1px solid rgba(243,236,220,0.15)',
            display:'flex', alignItems:'center', justifyContent:'space-between',
          }}>
            <div>
              <div style={{ fontFamily:'var(--ff-mono)', fontSize:10, letterSpacing:'0.14em', textTransform:'uppercase', color:'rgba(243,236,220,0.55)' }}>
                Ask WanderBrief · Live
              </div>
              <div className="display" style={{ fontSize:18, color:'var(--paper)' }}>
                For {client.client_name}
              </div>
            </div>
          </div>

          {/* Messages */}
          <div ref={scrollRef} style={{ flex:1, overflowY:'auto', padding:'14px 18px', minHeight:200 }}>
            {msgs.map((m, i) => (
              <div key={i} style={{ marginBottom:14, maxWidth: m.role==='user' ? '85%' : '100%', marginLeft: m.role==='user' ? 'auto' : 0 }}>
                <div style={{
                  fontFamily:'var(--ff-mono)', fontSize:9, letterSpacing:'0.14em',
                  textTransform:'uppercase', color:'rgba(243,236,220,0.5)', marginBottom:4,
                }}>
                  {m.role==='user' ? 'You' : 'WanderBrief'}{m.fallback ? ' · fallback' : ''}{m.error ? ' · error' : ''}
                </div>
                <div style={{
                  fontSize:14, lineHeight:1.6, whiteSpace:'pre-wrap',
                  fontFamily: m.role==='assistant' ? 'var(--ff-display)' : 'var(--ff-body)',
                  fontStyle: m.role==='assistant' ? 'italic' : 'normal',
                  color: m.role==='user' ? 'rgba(243,236,220,0.88)' : 'var(--paper)',
                  background: m.role==='user' ? 'rgba(243,236,220,0.08)' : 'transparent',
                  padding: m.role==='user' ? '8px 12px' : 0, borderRadius: m.role==='user' ? 6 : 0,
                }}>{m.content}</div>
              </div>
            ))}
            {busy && (
              <div style={{ fontFamily:'var(--ff-mono)', fontSize:11, color:'rgba(243,236,220,0.5)', letterSpacing:'0.1em' }}>
                thinking…
              </div>
            )}
          </div>

          {/* Input */}
          <form onSubmit={(e)=>{e.preventDefault(); ask(input);}} style={{
            display:'flex', gap:8, padding:'12px 14px',
            borderTop:'1px solid rgba(243,236,220,0.15)',
          }}>
            <input value={input} onChange={(e)=>setInput(e.target.value)}
              placeholder={`Ask about ${client.business_name}…`}
              style={{
                flex:1, background:'transparent', border:'1px solid rgba(243,236,220,0.22)',
                outline:'none', color:'var(--paper)',
                fontFamily:'var(--ff-body)', fontSize:14,
                padding:'8px 10px', borderRadius:6,
              }}
            />
            <button type="submit" disabled={busy} style={{
              background:'var(--accent)', color:'var(--paper)', border:0,
              padding:'8px 14px', fontFamily:'var(--ff-mono)', fontSize:11,
              letterSpacing:'0.14em', textTransform:'uppercase',
              cursor: busy ? 'not-allowed' : 'pointer', opacity: busy ? 0.5 : 1,
              borderRadius:6,
            }}>{busy ? '…' : 'Ask →'}</button>
          </form>
        </div>
      )}
    </React.Fragment>
  );
}

window.FloatingChat = FloatingChat;

</script>

<!-- App shell — renders all sections for the selected client -->
<script type="text/babel" data-component="app.jsx">
/* global React, ReactDOM, Gate, Hero, Verdict, Phase0, Advantages, Options, Audit, Timeline, Resources, AiTools, Chatbot, Closing, Nav,  NumbersPanel, WB_CLIENTS, WB_getBadges, WB_applyAccent */
const { useState: useStateApp, useEffect: useEffectApp } = React;

function App() {
  // Load saved tweak state from localStorage or defaults
  const defaults = (typeof WB_TWEAK_DEFAULTS !== 'undefined') ? WB_TWEAK_DEFAULTS : {
    client:'toasted-mallow', themeMode:'per-client', typePair:'instrument-inter', density:'editorial', paper:'warm'
  };
  const [tweaks, setTweaks] = useStateApp(() => {
    try { return { ...defaults, ...JSON.parse(localStorage.getItem('wb_tweaks')||'{}') }; }
    catch { return defaults; }
  });
  const [opened, setOpened] = useStateApp(() => {
    try { return !!JSON.parse(localStorage.getItem('wb_opened')||'false'); }
    catch { return false; }
  });

  const setKey = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    try {
      localStorage.setItem('wb_tweaks', JSON.stringify(next));
      window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [k]:v } }, '*');
    } catch {}
  };

  const client = WB_CLIENTS[tweaks.client] || WB_CLIENTS['toasted-mallow'];
  const badges = WB_getBadges(client);

  // Apply CSS-level tweaks
  useEffectApp(() => {
    const root = document.documentElement;
    root.setAttribute('data-paper', tweaks.paper);
    root.setAttribute('data-type', tweaks.typePair);
    root.setAttribute('data-density', tweaks.density);
    if (tweaks.themeMode === 'per-client') {
      // Let the [data-theme="..."] CSS block drive EVERYTHING — paper, ink, accent, display font.
      root.setAttribute('data-theme', tweaks.client);
      root.removeAttribute('data-theme-mode');
      // Clear any inline overrides from a prior override run
      ['--accent','--accent-ink','--accent-wash','--accent-ghost'].forEach(v => root.style.removeProperty(v));
    } else {
      // Override mode — neutral shell + forced accent hex
      root.removeAttribute('data-theme');
      root.setAttribute('data-theme-mode', 'override');
      if (tweaks.themeMode === 'ink')    WB_applyAccent('#11110E');
      if (tweaks.themeMode === 'rust')   WB_applyAccent('#B8531E');
      if (tweaks.themeMode === 'forest') WB_applyAccent('#2A5440');
    }
  }, [tweaks, client.primary_color]);

  // Reveal on scroll
  useEffectApp(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, [tweaks.client]);

  // Reset gate when switching client (so each client feels like a fresh envelope)
  useEffectApp(() => {
    const key = 'wb_opened_' + tweaks.client;
    try {
      setOpened(!!JSON.parse(localStorage.getItem(key)||'false'));
    } catch { setOpened(false); }
  }, [tweaks.client]);

  const handleOpen = () => {
    setOpened(true);
    try { localStorage.setItem('wb_opened_' + tweaks.client, 'true'); } catch {}
  };

  const sections = [
    { id:'hero',       label:'Open' },
    { id:'verdict',    label:'Verdict' },
    { id:'phase0',     label:'Do Today' },
    { id:'advantages', label:'Advantages' },
    { id:'options',    label:'Paths' },
    { id:'audit',      label:'Audit' },
    { id:'timeline',   label:'90 Days' },
    { id:'tools',      label:'Tools' },
    { id:'resources',  label:'Library' },
    { id:'chat',       label:'Ask' },
    { id:'close',      label:'Close' },
  ];

  return (
    <React.Fragment>
      {!opened && <Gate client={client} onOpen={handleOpen} />}
      <Nav client={client} sections={sections} />
      <NumbersPanel client={client} />

      <main>
        <div id="hero" className="reveal in"><Hero client={client} badges={badges} /></div>
        <div id="verdict" className="reveal"><Verdict client={client} /></div>
        <div id="phase0" className="reveal"><Phase0 client={client} /></div>
        <div id="advantages" className="reveal"><Advantages client={client} badges={badges} /></div>
        <div id="options" className="reveal"><Options client={client} /></div>
        <div id="audit" className="reveal"><Audit client={client} /></div>
        <div id="timeline" className="reveal"><Timeline client={client} /></div>
        <div id="tools" className="reveal"><AiTools client={client} /></div>
        <div id="resources" className="reveal"><Resources client={client} /></div>
        <div id="chat" className="reveal"><Chatbot client={client} /></div>
        <div id="close" className="reveal"><Closing client={client} /></div>
      </main>

      {/* Footer — Standard 14 */}
      <footer style={{
        background:'var(--ink)', color:'rgba(243,236,220,0.72)',
        padding:'var(--s-8) 0 var(--s-7)', fontSize:13, lineHeight:1.7,
      }}>
        <div className="container-wide" style={{ display:'grid', gridTemplateColumns:'minmax(0,2fr) minmax(0,1fr) minmax(0,1fr) minmax(0,1fr)', gap:'var(--s-6)' }} className="wb-foot">
          <div>
            <div className="display" style={{ fontSize:28, color:'var(--paper)', marginBottom:10 }}>WanderVerse<span style={{ color:'var(--accent)' }}>.</span></div>
            <p style={{ fontSize:14, maxWidth:400, color:'rgba(243,236,220,0.6)' }}>
              145 products, one ecosystem. Operated by Eisinger Holdings LLC. Proceeds flow to Wandering With Pride Inc — a 501(c)(3) supporting LGBTQ+ travel safety, scholarships, and chosen-family care.
            </p>
          </div>
          <div>
            <div className="fine" style={{ color:'rgba(243,236,220,0.45)', marginBottom:10 }}>Standard 14</div>
            <p style={{ fontSize:13, color:'rgba(243,236,220,0.6)' }}>No advertising. No behavioral targeting. No data sales. Forever. This is not a marketing choice. It's a constraint we accept gladly.</p>
          </div>
          <div>
            <div className="fine" style={{ color:'rgba(243,236,220,0.45)', marginBottom:10 }}>This dossier</div>
            <p style={{ fontSize:13, color:'rgba(243,236,220,0.6)' }}>Prepared for {client.business_name}.<br/>Delivered {client.delivered_at}.<br/>Issue 001 of ∞.</p>
          </div>
          <div>
            <div className="fine" style={{ color:'rgba(243,236,220,0.45)', marginBottom:10 }}>Contact</div>
            <p style={{ fontSize:13, color:'rgba(243,236,220,0.6)' }}>
              michael@wanderingwithpride.com<br/>
              wanderingwithpride.com
            </p>
          </div>
        </div>
        <style>{`
          @media (max-width: 900px) { .wb-foot { grid-template-columns: 1fr !important; } }
        `}</style>
      </footer>

      </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>

</body>
</html>
